<body class="bg-background text-on-surface min-h-screen flex flex-col">
<!-- TopNavBar (Suppressed active navigation for Transactional context) -->
<header class="bg-primary text-on-primary font-body-md text-body-md flex justify-between items-center w-full px-margin-desktop py-4 fixed top-0 z-50 shadow-sm">
<div class="flex items-center gap-base">
<span class="font-headline-sm text-headline-sm font-bold text-on-primary">OddsLab</span>
</div>
<nav class="hidden md:flex items-center gap-lg">
<a class="text-on-primary-container font-medium hover:opacity-80 transition-opacity" href="#">Markets</a>
<a class="text-on-primary-container font-medium hover:opacity-80 transition-opacity" href="#">Learn</a>
<a class="text-on-primary-container font-medium hover:opacity-80 transition-opacity" href="#">Leaderboard</a>
</nav>
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-on-primary hover:opacity-80 transition-opacity">notifications</button>
<button class="material-symbols-outlined text-on-primary hover:opacity-80 transition-opacity">account_circle</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-margin-mobile pt-xl pb-xl">
<div class="w-full max-w-[400px] bg-surface-container-lowest border border-outline-variant rounded-xl p-lg elevation-l2">
<div class="mb-lg">
<h1 class="font-headline-lg text-headline-lg text-primary mb-xs">Welcome back</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Access your strategy terminal and market insights.</p>
</div>
<form class="space-y-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-xs text-label-xs text-secondary block" for="email">Email</label>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md focus:outline-none focus:border-primary transition-colors text-on-surface" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="font-label-xs text-label-xs text-secondary block" for="password">Password</label>
<a class="font-label-xs text-label-xs text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border border-outline-variant rounded-lg px-md py-sm font-body-md text-body-md focus:outline-none focus:border-primary transition-colors text-on-surface" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary text-on-primary font-body-md font-bold py-sm rounded-lg hover:opacity-90 active:scale-95 transition-all mt-sm" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-outline-variant"></span>
</div>
<div class="relative flex justify-center text-label-xs">
<span class="bg-surface-container-lowest px-sm text-secondary">OR CONTINUE WITH</span>
</div>
</div>
<!-- Social/Alt Login -->
<div class="grid grid-cols-1 gap-sm">
<button class="flex items-center justify-center gap-sm bg-surface-container-low border border-outline-variant text-on-surface py-sm rounded-lg hover:bg-surface-variant transition-colors font-body-sm">
<span class="material-symbols-outlined text-[18px]">account_balance</span>
                    Institution Login
                </button>
</div>
<!-- Redirect Link -->
<div class="mt-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-semibold hover:underline" href="#">Sign up</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-background text-secondary font-body-sm text-body-sm w-full py-xl border-t border-outline-variant">
<div class="flex flex-col md:flex-row justify-between items-center px-margin-desktop gap-md">
<div class="flex flex-col items-center md:items-start gap-xs">
<span class="font-headline-sm text-headline-sm font-bold text-primary">OddsLab</span>
<p class="text-secondary opacity-80">© 2024 OddsLab Prediction Systems. All rights reserved.</p>
</div>
<div class="flex flex-wrap justify-center gap-md">
<a class="text-secondary hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-secondary hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-secondary hover:text-primary transition-colors" href="#">Risk Disclosure</a>
<a class="text-secondary hover:text-primary transition-colors" href="#">Community Guidelines</a>
</div>
</div>
</footer>
<!-- Micro-interactions Script -->
<script>
        document.querySelectorAll('button, a').forEach(elem => {
            elem.addEventListener('mousedown', () => {
                elem.classList.add('scale-95');
            });
            elem.addEventListener('mouseup', () => {
                elem.classList.remove('scale-95');
            });
            elem.addEventListener('mouseleave', () => {
                elem.classList.remove('scale-95');
            });
        });
    </script>
</body></html>
